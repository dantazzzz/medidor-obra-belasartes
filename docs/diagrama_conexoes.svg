<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 760" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <rect x="0" y="0" width="980" height="760" rx="0" fill="#0b0f17"/>
  <text x="490" y="40" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">Medidor de Obra — Mapa de Conexoes</text>
  <text x="490" y="66" fill="#94a3b8" font-size="15" text-anchor="middle">Placa Waveshare ESP32-S3-Touch-LCD-1.46B — tudo on-board (1 placa). Os numeros sao os GPIO do ESP32-S3.</text>

  <!-- ===== ESP32-S3 (centro) ===== -->
  <rect x="395" y="318" width="190" height="150" rx="16" fill="#0e131c" stroke="#e2e8f0" stroke-width="2.5"/>
  <text x="490" y="378" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">ESP32-S3</text>
  <text x="490" y="402" fill="#94a3b8" font-size="13" text-anchor="middle">2 nucleos · WiFi/BT</text>
  <text x="490" y="420" fill="#94a3b8" font-size="13" text-anchor="middle">PSRAM 8MB</text>
  <text x="490" y="446" fill="#64748b" font-size="12" text-anchor="middle">o "cerebro"</text>

  <!-- ===== Barramento I2C (vertical, esquerda) ===== -->
  <line x1="320" y1="120" x2="320" y2="610" stroke="#14b8a6" stroke-width="3"/>
  <text x="332" y="116" fill="#14b8a6" font-size="13" font-weight="700">I2C  400 kHz</text>
  <!-- liga o barramento ao ESP -->
  <line x1="320" y1="372" x2="395" y2="372" stroke="#14b8a6" stroke-width="3"/>
  <text x="358" y="364" fill="#14b8a6" font-size="12" text-anchor="middle" font-weight="700">SDA 11</text>
  <text x="358" y="388" fill="#14b8a6" font-size="12" text-anchor="middle" font-weight="700">SCL 10</text>

  <!-- dispositivos I2C (caixas a esquerda) -->
  <!-- Touch -->
  <line x1="250" y1="150" x2="320" y2="150" stroke="#14b8a6" stroke-width="2.5"/>
  <rect x="60" y="115" width="190" height="72" rx="12" fill="#111827" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="74" y="143" fill="#e5e7eb" font-size="16" font-weight="700">Touch SPD2010</text>
  <text x="74" y="163" fill="#94a3b8" font-size="12">toque da tela · addr 0x53</text>
  <text x="74" y="180" fill="#5b6673" font-size="11">INT = GPIO4</text>

  <!-- IMU -->
  <line x1="250" y1="262" x2="320" y2="262" stroke="#14b8a6" stroke-width="2.5"/>
  <rect x="60" y="227" width="190" height="72" rx="12" fill="#111827" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="74" y="255" fill="#e5e7eb" font-size="16" font-weight="700">IMU QMI8658</text>
  <text x="74" y="275" fill="#94a3b8" font-size="12">acelerometro+giro · 0x6B</text>
  <text x="74" y="292" fill="#5b6673" font-size="11">vira nivel/prumo/transferidor</text>

  <!-- RTC -->
  <line x1="250" y1="374" x2="320" y2="374" stroke="#14b8a6" stroke-width="2.5"/>
  <rect x="60" y="339" width="190" height="72" rx="12" fill="#111827" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="74" y="367" fill="#e5e7eb" font-size="16" font-weight="700">RTC PCF85063</text>
  <text x="74" y="387" fill="#94a3b8" font-size="12">relogio · addr 0x51</text>
  <text x="74" y="404" fill="#5b6673" font-size="11">data/hora das medicoes</text>

  <!-- Expander -->
  <line x1="250" y1="500" x2="320" y2="500" stroke="#14b8a6" stroke-width="2.5"/>
  <rect x="60" y="451" width="190" height="100" rx="12" fill="#111827" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="74" y="479" fill="#e5e7eb" font-size="16" font-weight="700">TCA9554</text>
  <text x="74" y="499" fill="#94a3b8" font-size="12">expansor de portas · 0x20</text>
  <text x="74" y="518" fill="#5b6673" font-size="11">controla: RST do display,</text>
  <text x="74" y="534" fill="#5b6673" font-size="11">RST do touch e o backlight</text>

  <!-- ===== Display QSPI (topo) ===== -->
  <line x1="490" y1="318" x2="490" y2="250" stroke="#38bdf8" stroke-width="3"/>
  <rect x="355" y="120" width="270" height="130" rx="14" fill="#111827" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="490" y="150" fill="#e5e7eb" font-size="17" font-weight="700" text-anchor="middle">Tela AMOLED SPD2010</text>
  <text x="490" y="170" fill="#94a3b8" font-size="12" text-anchor="middle">redonda 412x412 · barramento QSPI (4 vias)</text>
  <text x="490" y="196" fill="#38bdf8" font-size="12.5" text-anchor="middle" font-weight="700">SCK 40 · CS 21 · TE 18</text>
  <text x="490" y="216" fill="#38bdf8" font-size="12.5" text-anchor="middle" font-weight="700">D0 46 · D1 45 · D2 42 · D3 41</text>
  <text x="490" y="238" fill="#5b6673" font-size="11" text-anchor="middle">RST e backlight via TCA9554</text>

  <!-- ===== Microfone I2S (direita) ===== -->
  <line x1="585" y1="350" x2="700" y2="300" stroke="#a78bfa" stroke-width="3"/>
  <rect x="700" y="250" width="210" height="100" rx="14" fill="#111827" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="714" y="280" fill="#e5e7eb" font-size="16" font-weight="700">Microfone MEMS</text>
  <text x="714" y="300" fill="#94a3b8" font-size="12">I2S · vira o decibelimetro</text>
  <text x="714" y="320" fill="#a78bfa" font-size="12.5" font-weight="700">BCK 15 · WS 2 · DIN 39</text>
  <text x="714" y="340" fill="#5b6673" font-size="11">16 kHz, 16 bits</text>

  <!-- ===== Bateria (direita) ===== -->
  <line x1="585" y1="400" x2="700" y2="410" stroke="#f59e0b" stroke-width="3"/>
  <rect x="700" y="378" width="210" height="74" rx="14" fill="#111827" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="714" y="406" fill="#e5e7eb" font-size="16" font-weight="700">Bateria LiPo</text>
  <text x="714" y="426" fill="#94a3b8" font-size="12">medida pelo ADC</text>
  <text x="714" y="444" fill="#f59e0b" font-size="12.5" font-weight="700">GPIO 8</text>

  <!-- ===== Botao PWR (direita) ===== -->
  <line x1="585" y1="436" x2="700" y2="515" stroke="#f59e0b" stroke-width="3"/>
  <rect x="700" y="480" width="210" height="80" rx="14" fill="#111827" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="714" y="508" fill="#e5e7eb" font-size="16" font-weight="700">Botao PWR + trava</text>
  <text x="714" y="528" fill="#94a3b8" font-size="12">liga/desliga</text>
  <text x="714" y="546" fill="#f59e0b" font-size="12.5" font-weight="700">entrada 6 · controle 7</text>

  <!-- ===== Legenda ===== -->
  <text x="60" y="630" fill="#94a3b8" font-size="14" font-weight="700">Legenda dos barramentos:</text>
  <rect x="60"  y="648" width="16" height="10" rx="2" fill="#14b8a6"/><text x="84"  y="658" fill="#cbd5e1" font-size="13">I2C (sensores)</text>
  <rect x="230" y="648" width="16" height="10" rx="2" fill="#38bdf8"/><text x="254" y="658" fill="#cbd5e1" font-size="13">QSPI (tela)</text>
  <rect x="380" y="648" width="16" height="10" rx="2" fill="#a78bfa"/><text x="404" y="658" fill="#cbd5e1" font-size="13">I2S (microfone)</text>
  <rect x="560" y="648" width="16" height="10" rx="2" fill="#f59e0b"/><text x="584" y="658" fill="#cbd5e1" font-size="13">energia / botao</text>

  <text x="60" y="700" fill="#475569" font-size="12.5">Observacao: e uma placa unica — nao ha fios externos. O diagrama mostra como o ESP32-S3 ja vem ligado, de fabrica,</text>
  <text x="60" y="718" fill="#475569" font-size="12.5">a cada componente embutido. O barramento I2C (2 fios: SDA 11 e SCL 10) e compartilhado por 4 chips, cada um com seu endereco.</text>
</svg>
